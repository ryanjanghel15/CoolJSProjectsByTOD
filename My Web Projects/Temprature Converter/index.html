<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @font-face {
            font-family: 'MyCustomFont';
            /* Choose a name for your font */
            src:url('/fonts/DigitalNumbers-Regular.ttf') format('truetype');
            /* Fallback format */
            font-weight: normal;
            /* Define the weight (e.g., normal, bold, 100-900) */
            font-style: normal;
            /* Define the style (e.g., normal, italic) */
            font-display: swap;
            /* Helps optimize font loading behavior */
        }

        body{
            font-family: 'MyCustomFont';
        }
        #calculator {
            height: 400px;
            width: 300px;
            border: 5px solid black;
            border-radius: 15px;
            box-shadow: 5px 10px 0px rgb(92, 92, 92);
            margin-left: auto;
            margin-right: auto;
            background-color: rgba(56, 56, 56, 1);
            animation: loadin 2s forwards;
            transform: translateY(0px);
        }

        .content {
            text-align: center;
            font-family: 'MyCustomFont';
        }
        button{
            border: 5px solid black;
            border-radius: 15px;
            background-color: rgb(96, 192, 148);
            transition: all 1s;
            font-family: 'MyCustomFont';
        }
        button:hover{
            border: 5px solid black;
            border-radius: 5px;
            background-color: rgb(255, 255, 255);
        }
        select{
            border: 5px solid black;
            border-radius: 15px;
            background-color: rgb(96, 192, 148);
            appearance: none; -webkit-appearance: none;
            font-family: 'MyCustomFont';
            padding: 2px;
        }

        input {
            width: 180px;
            border: 5px solid black;
            border-radius: 15px;
            background-color: rgb(96, 192, 148);
            font-size: 1em
        }

        .screen {
            width: 180px;
            height: 50px;
            display: inline-block;
            border: 5px solid black;
            border-radius: 5px;
            background-color: rgb(33, 71, 54);
        }

        #displayFont{
            font-size: 30px;
            color: white;
        }

        #error{
            position: absolute;
            right: -50px;
            top:-50px;
            height: 80px;
            opacity: 0;
        }

        @keyframes loadin {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
                transform: translateY(50px);
            }

        }
    </style>
    <link rel="stylesheet" href="/style.css">
    <script src="/index.js" defer></script>
</head>

<body>
    <div id="calculator">
        <img id="error" title="ERROR HAS OCCOURED" src="/red_error-removebg-preview.png">
        <div class="content">
            <br>
            <div class="screen">
                <label id="displayFont" >---°C</label>
            </div>
            <br><br>
            <input id="userIN" type="number">
            <br><br>
            <select id="fromValue">
                <option value="fromC">celsius</option>
                <option value="fromF">fahrenheit</option>
                <option value="fromK">kelvin</option>
            </select>
            <h5 style="color: white;">TO</h5>
            <select id="toValue">
                <option value="toC">celsius</option>
                <option value="toF">fahrenheit</option>
                <option value="toK">kelvin</option>
            </select><br><br>
            <button id="userBtn">Compute</button>
        </div>
    </div>

</body>

</html>
